<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayfa Bulunamadı - Emre'nin Seyahat Günlüğü</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .not-found {
            max-width: 600px;
            margin: 80px auto;
            text-align: center;
            padding: 40px 20px;
        }
        .not-found h1 {
            font-size: 72px;
            margin: 0 0 10px;
            color: #3498db;
        }
        .not-found p {
            font-size: 18px;
            margin: 10px 0 30px;
        }
        .not-found a {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .not-found a:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <main>
        <div class="not-found">
            <h1>404</h1>
            <h2>Sayfa Bulunamadı</h2>
            <p>Aradığın sayfa burada yok. Belki de bir yere seyahat etti ve kayboldu. 🗺️</p>
            <a href="index.html">🏠 Ana Sayfaya Dön</a>
        </div>
    </main>
</body>
</html>
